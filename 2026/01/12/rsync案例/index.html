    <h1 class="p-name article-title" itemprop="headline name">
      rsync案例
    </h1>
  

      </header>
    
    <div class="e-content article-entry" itemprop="articleBody">
      
        <figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br></pre></td><td class="code"><pre><span class="line">服务端: Rsync服务 10.0.0.41</span><br><span class="line">客户端: 10.0.0.7 10.0.0.31</span><br><span class="line">客户端脚本需求</span><br><span class="line">1.客户端提前准备存放的备份的目录，目录规则如</span><br><span class="line">下:/backup/web01_172.16.1.7_20251010</span><br><span class="line">2.客户端在本地打包备份(hosts passwd crontab)拷</span><br><span class="line">贝至/backup/web01_172.16.1.7_20251010</span><br><span class="line">3.客户端最后将备份的数据进行推送至备份服务器41</span><br><span class="line">4.客户端每天凌晨1点定时执行该脚本(定时每分钟执行)</span><br><span class="line">5.客户端服务器本地保留最近7天的数据, 避免浪费磁盘空间</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#!/bin/bash</span></span><br><span class="line"><span class="comment">##设置变量</span></span><br><span class="line">DIR=`hostname`_`hostname -I|awk <span class="string">&#x27;&#123;print $1&#125;&#x27;</span>`_`<span class="built_in">date</span> +%F`</span><br><span class="line"><span class="comment">#创建目录</span></span><br><span class="line"><span class="built_in">mkdir</span> -p /backup/<span class="variable">$DIR</span></span><br><span class="line"><span class="comment">#打包文件host和passwd</span></span><br><span class="line"><span class="built_in">cd</span> /etc/</span><br><span class="line">tar zcf /backup/<span class="variable">$DIR</span>/all.tar.gz hosts passwd</span><br><span class="line"><span class="built_in">md5sum</span> /backup/<span class="variable">$DIR</span>/all.tar.gz &gt; /backup/<span class="variable">$DIR</span>/md5.<span class="built_in">log</span></span><br><span class="line"><span class="comment">#推送到backup</span></span><br><span class="line"><span class="built_in">export</span> RSYNC_PASSWORD=123</span><br><span class="line">rsync -az /backup/<span class="variable">$DIR</span> rsync_backup@172.16.1.41::backup</span><br><span class="line"><span class="comment">#保留七天数据</span></span><br><span class="line">find /backup/ -mtime +7|xargs <span class="built_in">rm</span> -rf</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#写入定时任务 </span></span><br><span class="line">[root@web01 ~]#<span class="built_in">tail</span> -1 /etc/crontab</span><br><span class="line">00 01 * * * root sh /server/scripts/backup.sh &amp;&gt;/dev/null</span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
